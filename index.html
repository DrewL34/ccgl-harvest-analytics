<header>
  <h1>CCGL Harvest Analytics</h1>
  <p>Post-Harvest KPI Dashboard</p>
</header>

<main>

  <section class="kpi-grid">
    <div class="card">
      <h3>Total Harvests</h3>
      <p id="totalHarvests">0</p>
    </div>

    <div class="card">
      <h3>Total Dry Weight</h3>
      <p id="totalDryWeight">0 lbs</p>
    </div>

    <div class="card">
      <h3>Average Yield %</h3>
      <p id="avgYield">0%</p>
    </div>

    <div class="card">
      <h3>Average Waste %</h3>
      <p id="avgWaste">0%</p>
    </div>
  </section>

  <section class="card">
    <input
      type="text"
      id="searchInput"
      placeholder="Search strains..."
    />
  </section>

  <section class="card">
    <table id="harvestTable">
      <thead>
        <tr>
          <th>Strain</th>
          <th>Batch</th>
          <th>Harvest Date</th>
          <th>Dry Weight</th>
          <th>Yield %</th>
          <th>Waste %</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </section>

</main>
