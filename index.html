<body>

<div class="header">
    <h1>CCGL Harvest Analytics</h1>
    <p>Strain Performance Dashboard</p>
</div>

<div class="container">

    <div class="kpi-grid">

        <div class="kpi">
            <h2>0</h2>
            <p>Total Harvests</p>
        </div>

        <div class="kpi">
            <h2>0 lbs</h2>
            <p>Total Yield</p>
        </div>

        <div class="kpi">
            <h2>0%</h2>
            <p>Average Recovery</p>
        </div>

        <div class="kpi">
            <h2>0</h2>
            <p>Active Strains</p>
        </div>

    </div>

    <div class="card">
        <h2>Harvest Data</h2>

        <table>
            <thead>
                <tr>
                    <th>Strain</th>
                    <th>Harvest Date</th>
                    <th>Wet Weight</th>
                    <th>Dry Weight</th>
                </tr>
            </thead>
            <tbody id="harvestTable"></tbody>
        </table>
    </div>

</div>

</body>
